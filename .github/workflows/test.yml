name: Test

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck install.sh uninstall.sh scripts/preflight.sh scripts/cmd/*.sh

  bats:
    name: Bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run Bats tests
        run: |
          chmod +x tests/run.sh tests/helpers/mock_yq.py
          bats tests/*.bats
